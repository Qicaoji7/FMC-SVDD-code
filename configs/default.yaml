# FMC-SVDD Default Configuration
# Paper: Federated Multi-Center Deep SVDD with Lyapunov Convergence Guarantees

# Dataset
dataset: swat
temporal_window: 10        # SWaT=10, WADI=20
top_k_neighbors: 9         # SWaT=9, WADI=6

# Federated Learning
num_clients: 3
partition: severe           # iid | mild | severe
total_rounds: 50            # T
warmup_rounds: 10           # T_w (Phase I duration)
local_epochs: 3             # E

# Optimization
learning_rate: 1.0e-4       # η
weight_decay: 1.0e-6
lambda_reg: 1.0e-6          # λ (SVDD regularization)
batch_size: 64

# Encoder (GAT + Transformer)
gat_hidden_dims: [128, 64]
gat_heads: 4
transformer_layers: 2
transformer_hidden: 512
transformer_heads: 2
output_dim: 64              # Embedding dimension

# Multi-Center SVDD
svdd_k_range: [2, 3, 4, 5, 6, 7, 8]

# Contrastive Learning (SimGRACE)
eta_perturb: 0.1            # Perturbation strength
tau: 0.5                    # Temperature
lambda_cl: 0.5              # Contrastive loss weight

# RAA & DRO
kappa: 1.0                  # DRO scale factor

# Reproducibility
seeds: [42, 123, 456, 789, 1024]
device: "cuda:0"
